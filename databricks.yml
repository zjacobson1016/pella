bundle:
  name: pella-parts-forecasting
  engine: direct

include:
  - resources/*.yml

variables:
  catalog:
    default: "mfg_mc_se_sa"
  schema:
    default: "pella"
  volume:
    default: "raw_data"
scripts:
  generate_pella_data:
    content: .venv/bin/python3 src/data_generator/01_generate_pella_data.py
targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: group-demo
    variables:
      catalog: "mfg_mc_se_sa"
      schema: "pella"

  prod:
    mode: production
    workspace:
      profile: group-demo
    variables:
      catalog: "mfg_mc_se_sa"
      schema: "pella"
